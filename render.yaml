services:
  - type: web
    name: sitetrack
    env: node
    plan: starter # You can change this to 'free' if you don't need persistent disks, but SQLite requires a disk.
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: /data/sqlite.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
